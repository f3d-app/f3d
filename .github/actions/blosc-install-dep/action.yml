name: "Install blosc Dependency"
description: "Install blosc Dependency using cache when possible"
inputs:
  versions_file:
    description: "File to recover versions from"
    required: true
  cpu:
    description: "CPU architecture to build for"
    required: false
    default: "x86_64"

runs:
  using: "composite"
  steps:
    - name: Check required inputs
      shell: bash
      run: |
        [[ "${{inputs.versions_file}}" ]] || { echo "versions_file is empty" ; exit 1; }

    - name: Extract blosc version
      id: blosc_ver
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        name: blosc

    - name: Extract zlib version
      id: zlib_ver
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        name: zlib

    - name: Extract global cache index
      id: global_idx
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        special_name: global_cache_index

    - name: Cache blosc
      id: cache-blosc
      uses: actions/cache/restore@v5
      with:
        path: dependencies/blosc_install
        key: blosc-${{steps.blosc_ver.outputs.extract}}-${{steps.zlib_ver.outputs.extract}}-${{runner.os}}-${{inputs.cpu}}-${{steps.global_idx.outputs.extract}}-2

    # Dependents: openvdb vtk
    - name: Checkout blosc
      if: steps.cache-blosc.outputs.cache-hit != 'true'
      uses: actions/checkout@v6
      with:
        repository: Blosc/c-blosc
        path: "./dependencies/blosc"
        ref: ${{steps.blosc_ver.outputs.extract}}

    - name: Setup blosc
      if: steps.cache-blosc.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies
      shell: bash
      run: |
        mkdir blosc_build
        mkdir blosc_install

    - name: Configure blosc
      if: steps.cache-blosc.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies/blosc_build
      shell: bash
      run: >
        cmake ../blosc
        -DBUILD_BENCHMARKS=OFF
        -DBUILD_FUZZERS=OFF
        -DBUILD_SHARED=ON
        -DBUILD_STATIC=OFF
        -DBUILD_TESTS=OFF
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_INSTALL_PREFIX=../blosc_install
        -DCMAKE_PREFIX_PATH:PATH=$(pwd)/../install/
        -DPREFER_EXTERNAL_ZLIB=ON
        ${{ runner.os == 'macOS' && '-DCMAKE_OSX_DEPLOYMENT_TARGET=14.0' || null }}
        ${{ runner.os == 'Windows' && '-Ax64 -DCMAKE_POLICY_DEFAULT_CMP0091=NEW -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL' || null }}

    - name: Build blosc
      if: steps.cache-blosc.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies/blosc_build
      shell: bash
      run: cmake --build . --parallel 2 --target install --config Release

    - name: Copy to install
      working-directory: ${{github.workspace}}/dependencies/blosc_install
      shell: bash
      run: cp -r ./* ../install/

    - name: Save cache
      if: steps.cache-blosc.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        key: ${{ steps.cache-blosc.outputs.cache-primary-key }}
        path: dependencies/blosc_install
