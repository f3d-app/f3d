name: "Install Draco Dependency"
description: "Install Draco Dependency using cache when possible"
inputs:
  versions_file:
    description: "File to recover versions from"
    required: true
  cpu:
    description: "CPU architecture to build for"
    required: false
    default: "x86_64"

runs:
  using: "composite"
  steps:
    - name: Check required inputs
      shell: bash
      run: |
        [[ "${{inputs.versions_file}}" ]] || { echo "versions_file is empty" ; exit 1; }

    - name: Extract draco version
      id: draco_ver
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        name: draco

    - name: Extract global cache index
      id: global_idx
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        special_name: global_cache_index

    - name: Cache draco
      id: cache-draco
      uses: actions/cache/restore@v5
      with:
        path: dependencies/draco_install
        key: draco-${{steps.draco_ver.outputs.extract}}-${{runner.os}}-${{inputs.cpu}}-${{steps.global_idx.outputs.extract}}-1

    - name: Checkout Draco
      if: steps.cache-draco.outputs.cache-hit != 'true'
      uses: actions/checkout@v6
      with:
        repository: google/draco
        path: "./dependencies/draco"
        ref: ${{inputs.version}}

    - name: Setup Draco
      if: steps.cache-draco.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies
      shell: bash
      run: |
        mkdir draco_build
        mkdir draco_install

    - name: Configure Draco
      if: steps.cache-draco.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies/draco_build
      shell: bash
      run: >
        cmake ../draco
        -DBUILD_SHARED_LIBS=ON
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_INSTALL_PREFIX=../draco_install
        -DCMAKE_POSITION_INDEPENDENT_CODE=ON
        -DDRACO_BACKWARDS_COMPATIBILITY=OFF
        -DDRACO_JS_GLUE=OFF
        ${{ runner.os == 'macOS' && '-DCMAKE_OSX_DEPLOYMENT_TARGET=14.0' || null }}
        ${{ runner.os == 'Windows' && '-Ax64 -DCMAKE_POLICY_DEFAULT_CMP0091=NEW -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL' || null }}

    - name: Build Draco
      if: steps.cache-draco.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies/draco_build
      shell: bash
      run: cmake --build . --parallel 2 --target install --config Release

    - name: Copy to install
      working-directory: ${{github.workspace}}/dependencies/draco_install
      shell: bash
      run: cp -r ./* ../install/

    - name: Save cache
      if: steps.cache-draco.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        key: ${{ steps.cache-draco.outputs.cache-primary-key }}
        path: dependencies/draco_install
