name: "Install gdal Dependency"
description: "Install gdal Dependency using cache when possible"
inputs:
  versions_file:
    description: "File to recover versions from"
    required: true
  mindeps_label:
    description: "Label to flag for minimum versions dependencies"
    required: false
    default: "no-mindeps"
  cpu:
    description: "CPU architecture to build for"
    required: false
    default: "x86_64"

runs:
  using: "composite"
  steps:
    - name: Check required inputs
      shell: bash
      run: |
        [[ "${{inputs.versions_file}}" ]] || { echo "versions_file is empty" ; exit 1; }

    - name: Extract gdal version
      id: gdal_ver
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        name: gdal
        minver_label: ${{inputs.mindeps_label == 'mindeps' && 'minver' || ''}}

    - name: Extract geotiff version
      id: geotiff_ver
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        name: geotiff
        minver_label: ${{inputs.mindeps_label == 'mindeps' && 'minver' || ''}}

    - name: Extract proj version
      id: proj_ver
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        name: proj
        minver_label: ${{inputs.mindeps_label == 'mindeps' && 'minver' || ''}}

    - name: Extract sqlite_csb version
      id: sqlite_csb_ver
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        name: sqlite_csb
        minver_label: ${{inputs.mindeps_label == 'mindeps' && 'minver' || ''}}

    - name: Extract tiff version
      id: tiff_ver
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        name: tiff
        minver_label: ${{inputs.mindeps_label == 'mindeps' && 'minver' || ''}}

    - name: Extract zlib version
      id: zlib_ver
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        name: zlib
        minver_label: ${{inputs.mindeps_label == 'mindeps' && 'minver' || ''}}

    - name: Extract global cache index
      id: global_idx
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        special_name: global_cache_index

    - name: Cache gdal
      id: cache-gdal
      continue-on-error: true # https://github.com/actions/cache/issues/1754
      uses: actions/cache/restore@v5
      with:
        path: dependencies/gdal_install
        key: gdal-${{steps.gdal_ver.outputs.extract}}-${{steps.geotiff_ver.outputs.extract}}-${{steps.proj_ver.outputs.extract}}-${{steps.sqlite_csb_ver.outputs.extract}}-${{steps.tiff_ver.outputs.extract}}-${{steps.zlib_ver.outputs.extract}}-${{runner.os}}-${{inputs.cpu}}-${{steps.global_idx.outputs.extract}}-5

    # Dependents: pdal vtk
    - name: Checkout gdal
      if: steps.cache-gdal.outputs.cache-hit != 'true'
      uses: actions/checkout@v6
      with:
        repository: OSGeo/gdal
        path: "./dependencies/gdal"
        ref: ${{steps.gdal_ver.outputs.extract}}

    # https://github.com/OSGeo/gdal/issues/14015
    - name: Patch GDAL rpath issue
      if: steps.cache-gdal.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies/gdal
      shell: bash
      run: patch -p1 < $GITHUB_ACTION_PATH/fix_install_rpath.patch

    - name: Setup gdal
      if: steps.cache-gdal.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies
      shell: bash
      run: |
        mkdir gdal_build
        mkdir gdal_install

    - name: Configure gdal
      if: steps.cache-gdal.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies/gdal_build
      shell: bash
      run: >
        cmake ../gdal
        -DBUILD_APPS=OFF
        -DBUILD_DOCS=OFF
        -DBUILD_PYTHON_BINDINGS=OFF
        -DBUILD_SHARED_LIBS=ON
        -DBUILD_TESTING=OFF
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_INSTALL_PREFIX=../gdal_install
        -DCMAKE_PREFIX_PATH:PATH=$(pwd)/../install/
        -DENABLE_GNM=OFF
        -DENABLE_PAM=OFF
        -DGDAL_BUILD_OPTIONAL_DRIVERS=OFF
        -DGDAL_SET_INSTALL_RELATIVE_RPATH=ON
        -DGDAL_USE_EXTERNAL_LIBS=OFF
        -DGDAL_USE_GEOTIFF=ON 
        -DGDAL_USE_GEOTIFF_INTERNAL=OFF
        -DGDAL_USE_TIFF=ON
        -DGDAL_USE_TIFF_INTERNAL=OFF 
        -DGDAL_USE_ZLIB=ON
        -DGDAL_USE_ZLIB_INTERNAL=OFF 
        -DOGR_BUILD_OPTIONAL_DRIVERS=OFF
        -DPROJ_ROOT:PATH=$(pwd)/../install/
        ${{ runner.os == 'macOS' && '-DCMAKE_OSX_DEPLOYMENT_TARGET=14.0' || null }}
        ${{ runner.os == 'Windows' && '-Ax64 -DCMAKE_POLICY_DEFAULT_CMP0091=NEW -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL' || null }}

    - name: Build gdal
      if: steps.cache-gdal.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies/gdal_build
      shell: bash
      run: cmake --build . --parallel 2 --target install --config Release

    - name: Copy to install
      working-directory: ${{github.workspace}}/dependencies/gdal_install
      shell: bash
      run: cp -r ./* ../install/

    - name: Save cache
      if: steps.cache-gdal.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        key: ${{ steps.cache-gdal.outputs.cache-primary-key }}
        path: dependencies/gdal_install
