name: "Install Imath Dependency"
description: "Install Imath Dependency using cache when possible"
inputs:
  versions_file:
    description: "File to recover versions from"
    required: true
  mindeps_label:
    description: "Label to flag for minimum versions dependencies"
    required: false
    default: "no-mindeps"
  cpu:
    description: "CPU architecture to build for"
    required: false
    default: "x86_64"

runs:
  using: "composite"
  steps:
    - name: Check required inputs
      shell: bash
      run: |
        [[ "${{inputs.versions_file}}" ]] || { echo "versions_file is empty" ; exit 1; }

    - name: Extract imath version
      id: imath_ver
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        name: imath
        minver_label: ${{inputs.mindeps_label == 'mindeps' && 'minver' || ''}}

    - name: Extract global cache index
      id: global_idx
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        special_name: global_cache_index

    - name: Cache imath
      id: cache-imath
      continue-on-error: true # https://github.com/actions/cache/issues/1754
      uses: actions/cache/restore@v5
      with:
        path: dependencies/imath_install
        key: imath-${{steps.imath_ver.outputs.extract}}-${{runner.os}}-${{inputs.cpu}}-${{steps.global_idx.outputs.extract}}-1

    # Dependents: alembic openexr
    - name: Checkout Imath
      if: steps.cache-imath.outputs.cache-hit != 'true'
      uses: actions/checkout@v7
      with:
        repository: AcademySoftwareFoundation/Imath
        path: "./dependencies/imath"
        ref: ${{steps.imath_ver.outputs.extract}}

    - name: Setup Imath
      if: steps.cache-imath.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies
      shell: bash
      run: |
        mkdir imath_build
        mkdir imath_install

    - name: Configure Imath
      if: steps.cache-imath.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies/imath_build
      shell: bash
      run: >
        cmake ../imath
        -DBUILD_SHARED_LIBS=ON
        -DBUILD_TESTING=OFF
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_INSTALL_PREFIX:PATH=../imath_install
        ${{ runner.os == 'macOS' && '-DCMAKE_OSX_DEPLOYMENT_TARGET=14.0' || null }}
        ${{ runner.os == 'Windows' && '-Ax64 -DCMAKE_POLICY_DEFAULT_CMP0091=NEW -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL' || null }}

    - name: Build Imath
      if: steps.cache-imath.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies/imath_build
      shell: bash
      run: cmake --build . --parallel 2 --target install --config Release

    - name: Copy to install
      working-directory: ${{github.workspace}}/dependencies/imath_install
      shell: bash
      run: cp -r ./* ../install/

    - name: Save cache
      if: steps.cache-imath.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        key: ${{ steps.cache-imath.outputs.cache-primary-key }}
        path: dependencies/imath_install
