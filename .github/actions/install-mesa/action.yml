name: "Install MESA"
description: "Install MESA"
inputs:
  cpu:
    description: "CPU architecture to build for"
    required: false
    default: "x86_64"
  path:
    description: "Path to install MESA"
    required: false
    default: ""
  version:
    description: "MESA version to install"
    required: false
    default: "24.3.4"

runs:
  using: "composite"
  steps:
    - name: Cache MESA
      id: cache-mesa
      continue-on-error: true # https://github.com/actions/cache/issues/1754
      uses: actions/cache/restore@v5
      with:
        path: dependencies/mesa_install
        key: mesa-${{inputs.version}}-${{runner.os}}-${{inputs.cpu}}-22

    - name: Set up Python
      if: steps.cache-mesa.outputs.cache-hit != 'true'
      uses: actions/setup-python@v6
      with:
        python-version: 3.14

    - name: Setup MSVC (Windows)
      if: steps.cache-mesa.outputs.cache-hit != 'true' && runner.os == 'Windows'
      uses: TheMrMilchmann/setup-msvc-dev@v4
      with:
        arch: x64

    # https://github.com/ilammy/msvc-dev-cmd#caveats
    - name: Remove Git link.exe (Windows)
      if: steps.cache-mesa.outputs.cache-hit != 'true' && runner.os == 'Windows'
      shell: bash
      run: rm $(which link.exe)

    - name: Install Mesa Python dependencies
      if: steps.cache-mesa.outputs.cache-hit != 'true'
      shell: bash
      run: python -m pip install meson mako packaging PyYAML

    - name: Install Flex/Bison (Windows)
      if: steps.cache-mesa.outputs.cache-hit != 'true' && runner.os == 'Windows'
      shell: bash
      run: choco install winflexbison3 --no-progress -y

    - name: Install Flex/Bison (Linux)
      if: steps.cache-mesa.outputs.cache-hit != 'true' && runner.os == 'Linux'
      shell: bash
      run: apt-get install -y bison byacc flex pkg-config ninja-build python3-dev llvm-dev libzstd-dev

    #- name: Setup LLVM
    #  uses: ZhongRuoyu/setup-llvm@v0
    #  with:
    #    llvm-version: 22

    - name: Install LLVM (Windows)
      if: steps.cache-mesa.outputs.cache-hit != 'true' && runner.os == 'Windows'
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.8/clang+llvm-22.1.8-x86_64-pc-windows-msvc.tar.xz" -OutFile "$env:TEMP\llvm.tar.xz"
        New-Item -ItemType Directory -Force -Path "$env:TEMP\LLVM"
        unxz -c "$env:TEMP\llvm.tar.xz" | tar -xf - -C "$env:TEMP\LLVM" --strip-components=1
        echo "$env:TEMP\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Install LLVM (macOS)
      if: steps.cache-mesa.outputs.cache-hit != 'true' && runner.os == 'macOS'
      shell: bash
      run: |
        brew install llvm zstd
        echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH
        echo "LDFLAGS=-L$(brew --prefix zstd)/lib" >> $GITHUB_ENV

    - name: Check LLVM
      if: steps.cache-mesa.outputs.cache-hit != 'true'
      shell: bash
      run: llvm-config --version

    - name: Checkout MESA
      if: steps.cache-mesa.outputs.cache-hit != 'true'
      shell: bash
      run: |
        git clone --recurse-submodules --depth 1 --branch mesa-${{inputs.version}} https://gitlab.freedesktop.org/mesa/mesa.git dependencies/mesa

    - name: Setup MESA
      if: steps.cache-mesa.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies
      shell: bash
      run: |
        mkdir mesa_build
        mkdir mesa_install

    - name: Configure MESA
      if: steps.cache-mesa.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies
      shell: bash
      run: >
        meson setup mesa_build mesa
        --prefix=$(pwd)/mesa_install
        --buildtype=release
        -Db_ndebug=true
        -Db_vscrt=mt
        -Dosmesa=true
        -Dgallium-drivers=softpipe
        -Dvulkan-drivers=[]
        -Dopengl=true
        -Dgles1=disabled
        -Dgles2=disabled
        -Degl=disabled
        -Dglx=disabled
        -Dxlib-lease=disabled
        -Dxmlconfig=disabled
        -Dexpat=disabled
        -Dplatforms=[]
        -Dshared-glapi=disabled
        -Dllvm=enabled
        -Dshared-llvm=${{ runner.os == 'Windows' && 'disabled' || 'enabled' }}
        -Dzlib=disabled

    - name: Build MESA
      if: steps.cache-mesa.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies/mesa_build
      shell: bash
      run: ninja -j2 install

    - name: Save cache
      if: steps.cache-mesa.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        key: ${{ steps.cache-mesa.outputs.cache-primary-key }}
        path: dependencies/mesa_install

    - name: Check DLL dependencies
      if: runner.os == 'Windows'
      working-directory: ${{github.workspace}}/dependencies/mesa_install/bin
      shell: bash
      run: ldd osmesa.dll

    # Set the library name to be reused in the next step
    - name: Set library names
      if: runner.os == 'Windows'
      shell: bash
      run: |
        echo "MESA_LIBS=bin/*.dll" >> $GITHUB_ENV

    - name: Set library names
      if: runner.os == 'Linux'
      shell: bash
      run: |
        echo "MESA_LIBS=lib/x86_64-linux-gnu/*.so" >> $GITHUB_ENV

    - name: Set library names
      if: runner.os == 'macOS'
      shell: bash
      run: |
        echo "MESA_LIBS=lib/*.dylib" >> $GITHUB_ENV

    - name: Copy to specified path
      if: inputs.path != ''
      working-directory: ${{github.workspace}}/dependencies/mesa_install
      shell: bash
      run: |
        p=$(echo "${{inputs.path}}" | tr '\\' '/')
        for dir in $p; do
            cp $MESA_LIBS "$dir/"
        done
