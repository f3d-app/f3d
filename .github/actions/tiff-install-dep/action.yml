name: "Install tiff Dependency"
description: "Install tiff Dependency using cache when possible"
inputs:
  versions_file:
    description: "File to recover versions from"
    required: true
  cpu:
    description: "CPU architecture to build for"
    required: false
    default: "x86_64"

runs:
  using: "composite"
  steps:
    - name: Check required inputs
      shell: bash
      run: |
        [[ "${{inputs.versions_file}}" ]] || { echo "versions_file is empty" ; exit 1; }

    - name: Extract tiff version
      id: tiff_ver
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        name: tiff

    - name: Extract zlib version
      id: zlib_ver
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        name: zlib

    - name: Extract global cache index
      id: global_idx
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        special_name: global_cache_index

    - name: Cache tiff
      id: cache-tiff
      uses: actions/cache/restore@v5
      with:
        path: dependencies/tiff_install
        key: tiff-${{steps.tiff_ver.outputs.extract}}-${{steps.zlib_ver.outputs.extract}}-${{runner.os}}-${{inputs.cpu}}-${{steps.global_idx.outputs.extract}}-4

    # Dependents: gdal pdal vtk geotiff
    - name: Checkout tiff
      if: steps.cache-tiff.outputs.cache-hit != 'true'
      uses: actions/checkout@v6
      with:
        repository: libsdl-org/libtiff
        path: "./dependencies/tiff"
        ref: ${{steps.tiff_ver.outputs.extract}}

    - name: Setup tiff
      if: steps.cache-tiff.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies
      shell: bash
      run: |
        mkdir tiff_build
        mkdir tiff_install

    - name: Configure tiff
      if: steps.cache-tiff.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies/tiff_build
      shell: bash
      run: >
        cmake ../tiff
        -DBUILD_SHARED_LIBS=ON
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_INSTALL_PREFIX=../tiff_install
        -DCMAKE_PREFIX_PATH:PATH=$(pwd)/../install/
        -Dtiff-docs:BOOL=OFF
        -Djbig:BOOL=OFF
        -Djpeg:BOOL=OFF
        -Dlerc:BOOL=OFF
        -Dlibdeflate:BOOL=OFF
        -Dlzma:BOOL=OFF
        -Dwebp:BOOL=OFF
        -Dzstd:BOOL=OFF
        -Dzlib:BOOL=ON
        ${{ runner.os == 'macOS' && '-DCMAKE_OSX_DEPLOYMENT_TARGET=14.0' || null }}
        ${{ runner.os == 'Windows' && '-Ax64 -DCMAKE_POLICY_DEFAULT_CMP0091=NEW -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL' || null }}

    - name: Build tiff
      if: steps.cache-tiff.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies/tiff_build
      shell: bash
      run: cmake --build . --parallel 2 --target install --config Release

    - name: Copy to install
      working-directory: ${{github.workspace}}/dependencies/tiff_install
      shell: bash
      run: cp -r ./* ../install/

    - name: Save cache
      if: steps.cache-tiff.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        key: ${{ steps.cache-tiff.outputs.cache-primary-key }}
        path: dependencies/tiff_install
