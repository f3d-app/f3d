name: "Install webifc Dependency"
description: "Install webifc Dependency using cache when possible"
inputs:
  versions_file:
    description: "File to recover versions from"
    required: true
  mindeps_label:
    description: "Label to flag for minimum versions dependencies"
    required: false
    default: "no-mindeps"
  cpu:
    description: "CPU architecture to build for"
    required: false
    default: "x86_64"

runs:
  using: "composite"
  steps:
    - name: Check required inputs
      shell: bash
      run: |
        [[ "${{inputs.versions_file}}" ]] || { echo "versions_file is empty" ; exit 1; }

    - name: Extract webifc version
      id: webifc_ver
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        name: webifc

    - name: Extract global cache index
      id: global_idx
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        special_name: global_cache_index

    - name: Cache webifc
      id: cache-webifc
      uses: actions/cache/restore@v5
      with:
        path: dependencies/webifc_install
        key: webifc-${{steps.webifc_ver.outputs.extract}}-${{runner.os}}-${{inputs.cpu}}-${{steps.global_idx.outputs.extract}}-1

    - name: Checkout webifc
      if: steps.cache-webifc.outputs.cache-hit != 'true'
      uses: actions/checkout@v6
      with:
        repository: ThatOpen/engine_web-ifc
        path: "./dependencies/webifc"
        ref: ${{steps.webifc_ver.outputs.extract}}

    - name: Setup webifc
      if: steps.cache-webifc.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies
      shell: bash
      run: |
        mkdir webifc_build
        mkdir webifc_install

    - name: Configure webifc
      if: steps.cache-webifc.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies/webifc_build
      shell: bash
      run: >
        cmake ../webifc/src/cpp
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_POSITION_INDEPENDENT_CODE=ON
        -DCMAKE_INSTALL_PREFIX=../webifc_install
        ${{ runner.os == 'macOS' && '-DCMAKE_OSX_DEPLOYMENT_TARGET=14.0' || null }}
        ${{ runner.os == 'Windows' && '-Ax64 -DCMAKE_POLICY_DEFAULT_CMP0091=NEW -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL' || null }}

    - name: Build and install webifc
      if: steps.cache-webifc.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies/webifc_build
      shell: bash
      run: cmake --build . --parallel 2 --target install --config Release

    - name: Copy to install
      working-directory: ${{github.workspace}}/dependencies/webifc_install
      shell: bash
      run: cp -r ./* ../install/

    - name: Save cache
      if: steps.cache-webifc.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        key: ${{ steps.cache-webifc.outputs.cache-primary-key }}
        path: dependencies/webifc_install
