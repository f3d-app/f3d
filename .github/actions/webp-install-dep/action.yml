name: "Install WebP Dependency"
description: "Install WebP Dependency using cache when possible"
inputs:
  versions_file:
    description: "File to recover versions from"
    required: true
  mindeps_label:
    description: "Label to flag for minimum versions dependencies"
    required: false
    default: "no-mindeps"
  cpu:
    description: "CPU architecture to build for"
    required: false
    default: "x86_64"

runs:
  using: "composite"
  steps:
    - name: Check required inputs
      shell: bash
      run: |
        [[ "${{inputs.versions_file}}" ]] || { echo "versions_file is empty" ; exit 1; }

    - name: Extract webp version
      id: webp_ver
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        name: webp
        minver_label: ${{inputs.mindeps_label == 'mindeps' && 'minver' || ''}}

    - name: Extract global cache index
      id: global_idx
      uses: f3d-app/extract-version-action@main
      with:
        file: ${{inputs.versions_file}}
        special_name: global_cache_index

    - name: Cache webp
      id: cache-webp
      uses: actions/cache/restore@v5
      with:
        path: dependencies/webp_install
        key: webp-${{steps.webp_ver.outputs.extract}}-${{runner.os}}-${{inputs.cpu}}-${{steps.global_idx.outputs.extract}}-1

    - name: Checkout WebP
      if: steps.cache-webp.outputs.cache-hit != 'true'
      uses: actions/checkout@v6
      with:
        repository: webmproject/libwebp
        path: "./dependencies/webp"
        ref: ${{steps.webp_ver.outputs.extract}}

    - name: Setup WebP
      if: steps.cache-webp.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies
      shell: bash
      run: |
        mkdir webp_build
        mkdir webp_install

    - name: Configure WebP
      if: steps.cache-webp.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies/webp_build
      shell: bash
      run: >
        cmake ../webp
        -DBUILD_SHARED_LIBS=ON
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_INSTALL_PREFIX:PATH=../webp_install
        -DCMAKE_PREFIX_PATH:PATH=../install/
        -DWEBP_BUILD_ANIM_UTILS=OFF
        -DWEBP_BUILD_CWEBP=OFF
        -DWEBP_BUILD_DWEBP=OFF
        -DWEBP_BUILD_GIF2WEBP=OFF
        -DWEBP_BUILD_IMG2WEBP=OFF
        -DWEBP_BUILD_VWEBP=OFF
        -DWEBP_BUILD_WEBPINFO=OFF
        -DWEBP_BUILD_LIBWEBPMUX=OFF
        -DWEBP_BUILD_WEBPMUX=OFF
        -DWEBP_BUILD_EXTRAS=OFF
        ${{ runner.os == 'macOS' && '-DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 -DCMAKE_MACOSX_RPATH=ON' || null }}
        ${{ runner.os == 'Windows' && '-Ax64 -DCMAKE_POLICY_DEFAULT_CMP0091=NEW -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL' || null }}

    - name: Build WebP
      if: steps.cache-webp.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/dependencies/webp_build
      shell: bash
      run: cmake --build . --parallel 2 --target install --config Release

    - name: Copy to install
      working-directory: ${{github.workspace}}/dependencies/webp_install
      shell: bash
      run: cp -r ./* ../install/

    - name: Save cache
      if: steps.cache-webp.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        key: ${{ steps.cache-webp.outputs.cache-primary-key }}
        path: dependencies/webp_install
