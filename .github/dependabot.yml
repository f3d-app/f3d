version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    labels:
      - "source:CI"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "actions/*"
  - package-ecosystem: "github-actions"
    directories:
      - "/.github/actions/*/"
    labels:
      - "source:CI"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "actions/*"
  - package-ecosystem: "pip"
    directory: "/"
    labels:
      - "source:python"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/examples/libf3d/web/"
    labels:
      - "source:wasm"
    schedule:
      interval: "weekly"
