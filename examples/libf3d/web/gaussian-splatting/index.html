<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Volume rendering demo</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      .page-header {
        padding: 18px 24px;
        text-align: center;
      }
      .page-header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
      }

      .container {
        box-sizing: border-box;
        display: flex;
        gap: 16px;
        height: calc(100vh - 72px);
        max-height: 720px;
        max-width: 1200px;
        margin: 0 auto;
        padding: 16px;
        align-items: stretch;
      }

      .card {
        background: MintCream;
        border-radius: 10px;
        border: 1px solid #888;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .viewer {
        flex: 1 1 auto;
        min-width: 0;
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
        image-rendering: auto;
      }
    </style>
  </head>
  <body>
    <header class="page-header">
      <h1>Gaussian Splatting demo</h1>
    </header>

    <div class="container" id="main">
      <div class="card viewer">
        <canvas id="canvas"></canvas>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
