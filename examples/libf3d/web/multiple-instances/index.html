<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multiple instance demo</title>
    <style>
      /* Reset page spacing and base styles */
      html,
      body {
        height: 100%;
        margin: 0;
      }

      .page-header {
        padding: 18px 24px;
        text-align: center;
      }
      .page-header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
      }

      /* Layout: two cards side-by-side with a small gap and padding */
      .container {
        box-sizing: border-box;
        display: flex;
        gap: 16px;
        height: calc(100vh - 72px);
        padding: 16px;
        align-items: center;
        justify-content: center;
      }

      /* Card wrapper for a canvas + label */
      .card {
        position: relative;
        flex: 0 0 50%;
        min-width: 0;
        max-width: 720px;
        width: 50%;
        background: #121212;
        border-radius: 10px;
        border: 1px solid rgba(16, 24, 40, 0.06);
        box-shadow: 0 6px 18px rgba(16, 24, 40, 0.06);
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        height: 70vh;
        max-height: 640px;
      }

      /* Canvas fills remaining card space */
      .card canvas {
        width: 100%;
        height: 100%;
      }

      /* Keep rendering crisp (JS should also set drawing buffer size) */
      canvas:where(#canvas1, #canvas2) {
        image-rendering: auto;
      }
    </style>
  </head>
  <body>
    <header class="page-header">
      <h1>Multiple instance demo</h1>
    </header>

    <div class="container" id="main">
      <div class="card">
        <canvas id="canvas1"></canvas>
      </div>
      <div class="card">
        <canvas id="canvas2"></canvas>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
