<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Volume rendering demo</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      .page-header {
        padding: 18px 24px;
        text-align: center;
      }
      .page-header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
      }

      .container {
        box-sizing: border-box;
        display: flex;
        gap: 16px;
        height: calc(100vh - 72px);
        max-height: 720px;
        max-width: 1200px;
        margin: 0 auto;
        padding: 16px;
        align-items: stretch;
      }

      .card {
        background: #121212;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .viewer {
        flex: 1 1 auto;
        min-width: 0;
      }
      .viewer canvas {
        width: 100%;
        height: 100%;
        display: block;
        image-rendering: auto;
      }

      .controls {
        width: 280px;
        flex-shrink: 0;
        padding: 20px;
        overflow-y: auto;
      }

      .ui-section {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }

      label {
        color: #888;
        letter-spacing: 0.06em;
      }

      select {
        width: 256px;
        padding: 7px 10px;
        border-radius: 4px;
        border: 1px solid #888;
        background: #1e1e1e;
        color: #eee;
        cursor: pointer;
      }

      #tfEditor {
        width: 256px;
        height: 96px;
        border: 1px solid #888;
        background: #1e1e1e;
      }
    </style>
  </head>
  <body>
    <header class="page-header">
      <h1>Volume rendering demo</h1>
    </header>

    <div class="container" id="main">
      <div class="card viewer">
        <canvas id="canvas"></canvas>
      </div>
      <div class="card controls">
        <div class="ui-section">
          <label for="colormap">Colormap</label>
          <select id="colormap">
            <option>viridis</option>
            <option>inferno</option>
            <option>magma</option>
            <option>plasma</option>
            <option>cividis</option>
            <option>turbo</option>
            <option>warm</option>
            <option>cool</option>
            <option>spectral</option>
            <option>rainbow</option>
          </select>
        </div>

        <div class="ui-section">
          <label>Transfer function</label>
          <svg id="tfEditor"></svg>
          <small style="color: #888">
            Double-click to add point. Drag to move. Double-click point to
            remove.
          </small>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
